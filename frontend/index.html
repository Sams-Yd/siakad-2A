<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Informasi Akademik</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .endpoint { margin-top: 1.5rem; padding: 1rem; background: #eef; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Selamat Datang di Portal Informasi Akademik Kampus</h1>
        <p>Aplikasi ini adalah frontend sederhana untuk menguji koneksi API Backend.</p>
        
        <div class="endpoint">
            <h3>Test API</h3>
            <button onclick="checkStatus()">Cek Status Server</button>
            <pre id="status-result" style="margin-top: 10px; background: #333; color: #fff; padding: 10px; border-radius: 4px; display: none;"></pre>
        </div>
    </div>

    <script>
        async function checkStatus() {
            try {
                const response = await fetch('/');
                const result = await response.json();
                const resultElem = document.getElementById('status-result');
                resultElem.style.display = 'block';
                resultElem.innerText = JSON.stringify(result, null, 2);
            } catch (error) {
                const resultElem = document.getElementById('status-result');
                resultElem.style.display = 'block';
                resultElem.innerText = "Gagal mengambil data dari server.";
            }
        }
    </script>
</body>
</html>

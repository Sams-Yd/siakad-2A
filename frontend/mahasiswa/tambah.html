<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIAKAD — Tambah Mahasiswa</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; }

    header {
      background: #1a73e8;
      color: white;
      padding: 0.85rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header a { color: white; text-decoration: none; font-size: 1.2rem; }
    header h1 { font-size: 1rem; font-weight: 600; }

    nav {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 2rem;
      display: flex;
      gap: 0.5rem;
    }
    nav a {
      padding: 0.8rem 1.2rem;
      text-decoration: none;
      font-size: 0.875rem;
      color: #666;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
    }
    nav a.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 600; }
    nav a:hover:not(.active) { color: #1a73e8; }

    .container { max-width: 640px; margin: 2rem auto; padding: 0 1.5rem; }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 1.8rem;
    }
    .card h2 { font-size: 1rem; color: #444; margin-bottom: 1.4rem; padding-bottom: 0.6rem; border-bottom: 1px solid #eee; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group.full { grid-column: 1 / -1; }

    label { font-size: 0.82rem; font-weight: 600; color: #555; }
    input, select {
      padding: 0.55rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #1a73e8; }

    .form-actions { grid-column: 1 / -1; display: flex; gap: 0.75rem; margin-top: 0.5rem; }

    .btn {
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary   { background: #1a73e8; color: white; }
    .btn-secondary { background: #e8eaed; color: #333; }

    .alert {
      padding: 0.7rem 1rem;
      border-radius: 4px;
      font-size: 0.875rem;
      margin-bottom: 1.2rem;
      display: none;
    }
    .alert.show { display: block; }
    .alert-success { background: #e6f4ea; color: #1e7e34; border: 1px solid #c3e6cb; }
    .alert-error   { background: #fce8e6; color: #c5221f; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>

<header>
  <a href="/">&#8592;</a>
  <h1>Tambah Mahasiswa</h1>
</header>

<nav>
  <a href="/mahasiswa/daftar.html">Daftar</a>
  <a href="/mahasiswa/tambah.html" class="active">Tambah</a>
  <a href="/mahasiswa/login.html">Login</a>
</nav>

<div class="container">
  <div id="alert" class="alert"></div>
  <div class="card">
    <h2>Form Tambah Mahasiswa Baru</h2>
    <form id="form" onsubmit="submitForm(event)">
      <div class="form-grid">
        <div class="form-group">
          <label for="npm">NPM *</label>
          <input type="text" id="npm" placeholder="contoh: 714240041" required>
        </div>
        <div class="form-group">
          <label for="nama">Nama Lengkap *</label>
          <input type="text" id="nama" placeholder="contoh: Raditya Rizki" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="contoh: nama@email.com">
        </div>
        <div class="form-group">
          <label for="phone">Nomor HP *</label>
          <input type="text" id="phone" placeholder="contoh: 08123456789" required>
        </div>
        <div class="form-group">
          <label for="prodi">Program Studi</label>
          <input type="text" id="prodi" placeholder="contoh: Teknik Informatika">
        </div>
        <div class="form-group">
          <label for="angkatan">Angkatan</label>
          <input type="number" id="angkatan" placeholder="contoh: 2024" min="2000" max="2099">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Simpan</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
          <a href="/mahasiswa/daftar.html" class="btn btn-secondary">Lihat Daftar</a>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  function showAlert(type, msg) {
    const el = document.getElementById('alert');
    el.className = 'alert show alert-' + type;
    el.textContent = msg;
    setTimeout(() => el.classList.remove('show'), 5000);
  }

  async function submitForm(e) {
    e.preventDefault();
    const angkatan = document.getElementById('angkatan').value;
    const payload = {
      npm:      document.getElementById('npm').value.trim(),
      nama:     document.getElementById('nama').value.trim(),
      email:    document.getElementById('email').value.trim(),
      phone:    document.getElementById('phone').value.trim(),
      prodi:    document.getElementById('prodi').value.trim(),
      angkatan: angkatan ? parseInt(angkatan) : 0,
    };
    try {
      const res  = await fetch('/mahasiswa', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const json = await res.json();
      if (json.status !== 'success') throw new Error(json.message);
      showAlert('success', 'Mahasiswa berhasil ditambahkan!');
      document.getElementById('form').reset();
    } catch (e) {
      showAlert('error', 'Gagal: ' + e.message);
    }
  }
</script>
</body>
</html>
